<section class="ip-card">
  <div class="ip-section-head">
    <div>
      <h2 class="ip-section-title">{{TITLE}}</h2>
      <p class="ip-note">{{NOTE}}</p>
    </div>
    {{ACTION}}
  </div>

  {{FILTERS}}

  <div class="ip-table-wrap">
    <table class="ip-table">
      <thead>
        {{TABLE_HEAD}}
      </thead>
      <tbody>
        {{TABLE_BODY}}
      </tbody>
    </table>
  </div>
</section>
